name: test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check generated client
        run: make generate-check

      - name: Lint
        run: make lint

      - name: Test with coverage
        run: make coverage

      - name: Test with race detector
        run: go test -race ./...
